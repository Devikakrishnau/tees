version: '3.8'

services:
  frontend:
    image: node:20-alpine
    container_name: tees-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"

  app:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    image: tees-laravel
    container_name: tees-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: tees-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tees-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tees}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-tees_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile.python
    image: tees-ai
    container_name: tees-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LARAVEL_API_URL=http://webserver:80/api/ai/evaluations/store
    volumes:
      - ./ai_service:/app

volumes:
  dbdata:
